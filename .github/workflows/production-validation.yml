name: Production validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev --audit-level=moderate

  apple-static-validation:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate property lists
        run: |
          plutil -lint Info.plist
          plutil -lint useprocess/useprocess.entitlements
          plutil -lint useprocess/Privacy/PrivacyInfo.xcprivacy
      - name: Parse all Swift sources without building
        run: |
          failures=0
          while IFS= read -r file; do
            xcrun swiftc -frontend -parse "$file" >/dev/null 2>&1 || {
              echo "::error file=$file::Swift parse failed"
              failures=$((failures + 1))
            }
          done < <(find useprocess -name '*.swift' -type f | sort)
          exit "$failures"
      - name: Reject committed secrets
        run: |
          if git ls-files | grep -E '(CoachSecrets|BodyScanSecrets|RevenueCatSecrets)\.plist$'; then
            echo "::error::A local secrets plist is tracked by Git."
            exit 1
          fi
